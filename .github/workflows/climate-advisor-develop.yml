# Climate Advisor deployment workflow
name: Push CA to GHCR and deploy to EKS Develop
permissions:
  contents: read
  packages: write
  checks: write
on:
  workflow_dispatch:
  pull_request:
    branches: ["develop"]
    paths:
      - climate-advisor/service/**
      - climate-advisor/pyproject.toml
      - climate-advisor/uv.lock
      - climate-advisor/llm_config.yaml
      - climate-advisor/prompts/**
      - climate-advisor/k8s/deployment-dev.yml
      - climate-advisor/k8s/migrate-dev.yml
      - climate-advisor/k8s/service-dev.yml
      - climate-advisor/k8s/db-configmap-dev.yml
      - k8s/cc-ca-smoke-fixture.yml
      - .github/scripts/cc-ca-post-deploy-smoke.sh
      - .github/workflows/climate-advisor-develop.yml
  push:
    paths:
      - climate-advisor/service/**
      - climate-advisor/pyproject.toml
      - climate-advisor/uv.lock
      - climate-advisor/llm_config.yaml
      - climate-advisor/prompts/**
      - climate-advisor/k8s/deployment-dev.yml
      - climate-advisor/k8s/migrate-dev.yml
      - climate-advisor/k8s/service-dev.yml
      - climate-advisor/k8s/db-configmap-dev.yml
      - k8s/cc-ca-smoke-fixture.yml
      - .github/scripts/cc-ca-post-deploy-smoke.sh
      - .github/workflows/climate-advisor-develop.yml
    branches: ["develop"]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_CLIMATE_ADVISOR }}
      CA_LOG_LEVEL: debug
      CA_CORS_ORIGINS: "*"
      CC_BASE_URL: http://localhost:3000
      CA_DATABASE_URL: "sqlite+aiosqlite:///:memory:"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "climate-advisor/uv.lock"

      - name: Verify lockfile
        working-directory: climate-advisor
        run: |
          uv lock --check

      - name: Sync dependencies
        working-directory: climate-advisor
        run: |
          uv sync --locked --group dev

      - name: Validate OpenRouter API key
        working-directory: climate-advisor
        env:
          OPENROUTER_SMOKE_TEST: "1"
        run: |
          uv run --directory service pytest tests/test_openrouter_key_smoke.py \
                 --junit-xml=test-results-openrouter-smoke.xml \
                 -v --tb=short --color=yes

      - name: Run unit tests
        working-directory: climate-advisor
        run: |
          uv run --directory service pytest tests/test_cc_inventory_tool.py \
                 tests/test_citycatalyst_client.py \
                 tests/test_rag_tool.py \
                 tests/test_user_identity.py \
                 tests/test_document_embedding_model.py \
                 --junit-xml=test-results-unit.xml \
                 -v --tb=short --color=yes

      - name: Run TIER 1 critical tests
        working-directory: climate-advisor
        run: |
          uv run --directory service pytest tests/test_api_routes.py \
                 tests/test_agent_service.py \
                 tests/test_e2e_conversation.py \
                 --junit-xml=test-results-tier1.xml \
                 -v --tb=short --color=yes

      - name: Generate test coverage report
        working-directory: climate-advisor
        run: |
          uv run --directory service pytest tests/ \
                 --cov=app \
                 --cov-report=html \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 -v || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./climate-advisor/service/coverage.xml
          flags: climate-advisor
          name: climate-advisor-coverage
          fail_ci_if_error: false

      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Climate Advisor Test Results
          path: "climate-advisor/service/test-results-*.xml"
          reporter: "java-junit"
          fail-on-error: false

  pushToGHCR:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pushing Climate Advisor to GHCR
        env:
          VERSION: ${{ github.sha }}
          IMAGE: ghcr.io/open-earth-foundation/citycatalyst-climate-advisor
        run: |
          docker build -t $IMAGE:$VERSION -f climate-advisor/service/Dockerfile climate-advisor
          docker tag $IMAGE:$VERSION $IMAGE:dev
          docker push $IMAGE:$VERSION
          docker push $IMAGE:dev
  deployToEKS:
    needs: pushToGHCR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_EKS_DEV_USER }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_EKS_DEV_USER }}
      EKS_DEV_NAME: ${{ secrets.EKS_DEV_NAME }}
      MLFLOW_EXPERIMENT_NAME: ${{ vars.MLFLOW_EXPERIMENT_NAME || 'Clima' }}
    steps:
      - uses: actions/checkout@v4
      - name: Creating kubeconfig file
        run: aws eks update-kubeconfig --name ${{secrets.EKS_DEV_NAME}} --region us-east-1
      - name: Testing connection to EKS
        run: kubectl get pods -n default
      - name: Create or update MLflow credentials
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          : "${MLFLOW_TRACKING_USERNAME:?Set GitHub secret MLFLOW_TRACKING_USERNAME}"
          : "${MLFLOW_TRACKING_PASSWORD:?Set GitHub secret MLFLOW_TRACKING_PASSWORD}"
          kubectl -n default create secret generic mlflow-client-credentials \
            --from-literal=username="${MLFLOW_TRACKING_USERNAME}" \
            --from-literal=password="${MLFLOW_TRACKING_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploying service
        run: |
          kubectl apply -f climate-advisor/k8s/db-configmap-dev.yml -n default
          kubectl create -f climate-advisor/k8s/migrate-dev.yml -n default
          kubectl apply -f climate-advisor/k8s/service-dev.yml -n default
          kubectl apply -f climate-advisor/k8s/deployment-dev.yml -n default
          kubectl set env deployment/climate-advisor-dev \
            OPENROUTER_API_KEY=${{secrets.OPENROUTER_API_KEY}} \
            OPENAI_API_KEY=${{secrets.OPENAI_API_KEY_CLIMATE_ADVISOR}} \
            CC_API_KEY=${{secrets.CC_SERVICE_API_KEY}} \
            CA_LOG_LEVEL=info \
            CA_CORS_ORIGINS="*" \
            CC_BASE_URL=https://citycatalyst.openearth.dev \
            CA_FEATURE_FLAGS=STATIONARY_ENERGY_AGENTIC \
            MLFLOW_EXPERIMENT_NAME="${MLFLOW_EXPERIMENT_NAME}" \
            LANGSMITH_API_KEY=${{secrets.LANGSMITH_API_KEY}} \
            LANGSMITH_WORKSPACE_ID=${{secrets.LANGSMITH_WORKSPACE_ID}} \
            -n default
          kubectl rollout restart deployment climate-advisor-dev -n default

          kubectl rollout status deployment/climate-advisor-dev -n default --timeout=300s

  ccCaPostDeploySmoke:
    name: CA/CC post-deploy smoke
    needs: deployToEKS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_EKS_DEV_USER }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_EKS_DEV_USER }}
      EKS_DEV_NAME: ${{ secrets.EKS_DEV_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Creating kubeconfig file
        run: aws eks update-kubeconfig --name ${{secrets.EKS_DEV_NAME}} --region us-east-1

      - name: Run CA/CC post-deploy smoke
        run: |
          SMOKE_FIXTURE_MANIFEST=k8s/cc-ca-smoke-fixture.yml \
          CA_DEPLOYMENT_NAME=climate-advisor-dev \
          bash .github/scripts/cc-ca-post-deploy-smoke.sh
