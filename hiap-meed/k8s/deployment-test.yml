apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiap-meed-test
  namespace: default
  labels:
    app: hiap-meed-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hiap-meed-test
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hiap-meed-test
    spec:
      containers:
        - name: hiap-meed-test
          image: ghcr.io/open-earth-foundation/citycatalyst-hiap-meed:test
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FILE_ENABLED
              value: "true"
            - name: LOG_DIR
              value: "logs"
            - name: LOCAL_ARTIFACTS_ENABLED
              value: "false"
            - name: MLFLOW_ENABLED
              value: "true"
            - name: MLFLOW_TRACKING_URI
              value: "https://mlflow-dev.openearth.dev"
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mlflow-client-credentials
                  key: username
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-client-credentials
                  key: password
            - name: MLFLOW_EXPERIMENT_NAME
              value: "hiap-meed"
            - name: MLFLOW_ENVIRONMENT
              value: "test"
            - name: MLFLOW_HTTP_REQUEST_TIMEOUT
              value: "3"
            - name: MLFLOW_HTTP_REQUEST_MAX_RETRIES
              value: "1"
            - name: MLFLOW_HTTP_REQUEST_BACKOFF_FACTOR
              value: "1"
            - name: MLFLOW_HTTP_REQUEST_BACKOFF_JITTER
              value: "0"
            - name: GIT_PYTHON_REFRESH
              value: "quiet"
            - name: MLFLOW_ASYNC_LOGGING_ENABLED
              value: "true"
            - name: HIAP_MEED_MLFLOW_TOOL_TRACE_TEST_ENABLED
              value: "false"
            - name: HIAP_MEED_MLFLOW_TOOL_TRACE_TEST_MODEL
              value: "gpt-5.4-mini"
            - name: UPSTREAM_HTTP_TIMEOUT_SECONDS
              value: "30"
            - name: UPSTREAM_HTTP_MAX_RETRIES
              value: "2"
            - name: UPSTREAM_HTTP_RETRY_BACKOFF_SECONDS
              value: "0.5"
            - name: CCGLOBAL_API_BASE_URL
              value: "https://api.citycatalyst.io/"
            - name: HIAP_MEED_CITY_DATA_SOURCE
              value: "api"
            - name: HIAP_MEED_LEGAL_DATA_SOURCE
              value: "s3"
            - name: HIAP_MEED_LEGAL_S3_BUCKET
              value: "test-global-api"
            - name: HIAP_MEED_LEGAL_S3_KEY
              value: "raw_data/cl_ssg/cl_ssg_legal_signals/release/v2/legal-classification-v2.csv"
            - name: HIAP_MEED_LEGAL_S3_REGION
              value: "us-east-1"
            - name: HIAP_MEED_ACTION_PATHWAYS_DATA_SOURCE
              value: "api"
            - name: HIAP_MEED_ACTION_POLICY_SCORES_DATA_SOURCE
              value: "api"
            - name: HIAP_MEED_ACTION_MITIGATION_FEASIBILITY_SCORES_DATA_SOURCE
              value: "api"
            - name: HIAP_MEED_TOP_N
              value: "20"
            - name: ACTIVITY_DATA_LEVEL_MAPPING
              value: "false"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 30

