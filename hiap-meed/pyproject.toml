[project]
name = "hiap-meed"
version = "0.1.0"
description = "MEED+ prioritization engine: scores and ranks city climate actions across impact, alignment, and feasibility."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.1",
    "httpx>=0.28.1",
    "openai>=2.36.0",
    "python-dotenv>=1.2.2",
    "uvicorn>=0.47.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
